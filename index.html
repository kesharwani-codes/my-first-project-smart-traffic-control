<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Smart Traffic AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<script>
    if (!localStorage.getItem("user")) {
        window.location.href = "login.html";
    }
</script>

<div class="container">
    <!-- HEADER -->
    <div class="header">
        <div class="logo">
            <span>🚦</span>
            <h1>Traffic AI</h1>
        </div>
        <button class="logout" onclick="logout()">Exit</button>
    </div>

    <!-- HERO -->
    <div class="hero">
        <div class="hero-img"></div>
        <div class="hero-info">
            <h2>AI Traffic Control</h2>
            <p>Smart signals + Ambulance priority</p>
            <button onclick="scrollSim()">Start</button>
        </div>
    </div>

    <!-- SIMULATION -->
    <div id="sim" class="sim">
        <h3>🚗 Live Traffic</h3>
        
        <div class="road">
            <img src="https://images.unsplash.com/photo-1494976388531-d1058494cdd8?auto=format&fit=crop&w=800&q=80" class="road-bg">
            <div class="cars">
                <div class="car c1"></div>
                <div class="car c2"></div>
            </div>
            <div id="signalBox" class="signal">
                <div class="light"></div>
                <span id="sigName">R1</span>
            </div>
            <div id="ambAlert" class="amb-alert" style="display:none;">🚑</div>
        </div>
        
        <div class="inputs">
            <div class="field"><label>🚦 Road 1</label><input type="number" id="r1" value="12"></div>
            <div class="field"><label>🚦 Road 2</label><input type="number" id="r2" value="8"></div>
            <div class="field"><label>🚦 Road 3</label><input type="number" id="r3" value="15"></div>
            <div class="field"><label>🚦 Road 4</label><input type="number" id="r4" value="5"></div>
        </div>
        
        <div class="amb-row">
            <label class="amb-check">
                <input type="checkbox" id="ambMode"> 🚑 Emergency Mode
            </label>
            <select id="ambRoad" class="amb-select">
                <option value="1">Road 1 - North</option>
                <option value="2">Road 2 - East</option>
                <option value="3">Road 3 - South</option>
                <option value="4">Road 4 - West</option>
            </select>
        </div>
        
        <button class="ai-btn" onclick="runAI()">⚡ Run AI Optimization</button>
        <div id="aiMsg" class="msg"></div>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="stat">
            <span>🧠</span>
            <p id="aiDecision">-</p>
            <small>AI Decision</small>
        </div>
        <div class="stat">
            <span>🚗</span>
            <p id="totalVeh">0</p>
            <small>Total Vehicles</small>
        </div>
        <div class="stat">
            <span>🟢</span>
            <p id="activeRoad">R1</p>
            <small>Green Signal</small>
        </div>
    </div>

    <!-- CHART -->
    <div class="chart-box">
        <h3>📊 Traffic Analytics</h3>
        <canvas id="trafficChart"></canvas>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
