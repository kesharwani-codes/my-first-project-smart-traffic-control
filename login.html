<!DOCTYPE html>
<html>
<body style="text-align:center;background:#141e30;color:white;font-family:Arial;">

<h1>Login</h1>

<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

<script>
function signup(){
localStorage.setItem("user",user.value);
localStorage.setItem("pass",pass.value);
msg.innerText="Account Created";
}
function login(){
if(user.value===localStorage.getItem("user") && pass.value===localStorage.getItem("pass")){
window.location.href="index.html";
}else{
msg.innerText="Wrong Login";
}
}
</script>

</body>
</html>
